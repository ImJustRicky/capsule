<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Mortgage Calculator</title>
    <link rel="stylesheet" href="style.css" />
    <script src="app.js" defer></script>
  </head>
  <body>
    <main>
      <h1>Mortgage calculator</h1>
      <p class="sub">Works offline. Nothing leaves this capsule.</p>

      <form id="form">
        <label>Loan amount <input type="number" id="amount" value="350000" min="0" step="1000" /></label>
        <label>Annual rate (%) <input type="number" id="rate" value="6.5" min="0" step="0.01" /></label>
        <label>Term (years) <input type="number" id="years" value="30" min="1" max="50" /></label>
      </form>

      <section class="result">
        <div><span class="k">Monthly payment</span><span class="v" id="monthly">—</span></div>
        <div><span class="k">Total paid</span><span class="v" id="total">—</span></div>
        <div><span class="k">Total interest</span><span class="v" id="interest">—</span></div>
      </section>
    </main>
  </body>
</html>
