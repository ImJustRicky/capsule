<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Capsule</title>
    <link rel="stylesheet" href="host.css" />
    <script src="session.js"></script>
    <script src="host.js" defer></script>
  </head>
  <body>
    <div class="window-glow" aria-hidden="true"></div>

    <main id="open-screen" class="screen">
      <nav class="topbar">
        <div class="brand">
          <span class="brand-pill" aria-hidden="true">
            <span class="brand-pill-half"></span>
            <span class="brand-pill-half"></span>
          </span>
          <span class="brand-name">Capsule</span>
        </div>
        <div class="topbar-meta">
          <span class="kbd-hint"><kbd>I</kbd> inspect</span>
          <span class="kbd-hint"><kbd>R</kbd> run</span>
        </div>
      </nav>

      <article class="hero">
        <div class="hero-icon" aria-hidden="true">
          <svg viewBox="0 0 48 48" width="48" height="48">
            <defs>
              <linearGradient id="cap-grad" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0" stop-color="var(--accent-soft)" />
                <stop offset="1" stop-color="var(--accent)" />
              </linearGradient>
            </defs>
            <rect x="6" y="6" width="36" height="36" rx="11" fill="url(#cap-grad)" />
            <path
              d="M17 22 L22 27 L31 18"
              stroke="white"
              stroke-width="3"
              stroke-linecap="round"
              stroke-linejoin="round"
              fill="none"
            />
          </svg>
        </div>
        <div class="hero-body">
          <h1 id="cap-name" class="hero-title">&nbsp;</h1>
          <p id="cap-description" class="hero-description"></p>
          <div class="hero-meta">
            <span id="cap-version" class="chip"></span>
            <span id="cap-author" class="chip chip-muted"></span>
            <span id="cap-status" class="chip"></span>
          </div>
        </div>
      </article>

      <section class="panel" aria-labelledby="granted-heading">
        <header class="panel-header">
          <h2 id="granted-heading" class="panel-title">What this capsule can do</h2>
          <span class="panel-sub" id="granted-count"></span>
        </header>
        <ul id="can-list" class="grant-list"></ul>
      </section>

      <section class="panel denied" aria-labelledby="denied-heading">
        <header class="panel-header">
          <h2 id="denied-heading" class="panel-title">Blocked by the runtime</h2>
          <span class="panel-sub">enforced regardless of manifest</span>
        </header>
        <ul id="cannot-list" class="denied-grid"></ul>
      </section>

      <footer class="actions">
        <button id="btn-inspect" type="button" class="btn">
          <span class="btn-label">Inspect</span>
          <span class="btn-shortcut">I</span>
        </button>
        <button id="btn-run" type="button" class="btn btn-primary">
          <span class="btn-label">Run once</span>
          <span class="btn-shortcut">R</span>
          <svg class="btn-arrow" viewBox="0 0 16 16" width="14" height="14" aria-hidden="true">
            <path
              d="M3 8 H12 M8 4 L12 8 L8 12"
              stroke="currentColor"
              stroke-width="1.75"
              stroke-linecap="round"
              stroke-linejoin="round"
              fill="none"
            />
          </svg>
        </button>
      </footer>
    </main>

    <section id="run-screen" class="screen hidden">
      <div class="runbar">
        <button id="btn-back" type="button" class="btn btn-ghost">
          <svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true">
            <path
              d="M13 8 H4 M8 4 L4 8 L8 12"
              stroke="currentColor"
              stroke-width="1.75"
              stroke-linecap="round"
              stroke-linejoin="round"
              fill="none"
            />
          </svg>
          <span>Back</span>
        </button>
        <span id="runbar-title" class="runbar-title"></span>
        <span id="runbar-status" class="runbar-status"></span>
      </div>
      <iframe
        id="capsule-frame"
        title="Capsule"
        sandbox="allow-scripts"
        referrerpolicy="no-referrer"
      ></iframe>
    </section>

    <dialog id="permission-dialog">
      <h3 id="perm-title">Capability request</h3>
      <p id="perm-detail"></p>
      <div class="dialog-actions">
        <button id="perm-deny" type="button" class="btn">Deny</button>
        <button id="perm-allow" type="button" class="btn btn-primary">Allow once</button>
      </div>
    </dialog>

    <section id="inspect-screen" class="screen hidden">
      <div class="runbar">
        <button id="btn-inspect-back" type="button" class="btn btn-ghost">
          <svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true">
            <path
              d="M13 8 H4 M8 4 L4 8 L8 12"
              stroke="currentColor"
              stroke-width="1.75"
              stroke-linecap="round"
              stroke-linejoin="round"
              fill="none"
            />
          </svg>
          <span>Back</span>
        </button>
        <span class="runbar-title">Manifest</span>
      </div>
      <pre id="inspect-body"></pre>
    </section>
  </body>
</html>
